<div class="claim-page">

    <div class="page-header">
        <h2>Final Claim Submission</h2>
        <p>Submit discharge claim to insurer</p>
    </div>

    <div class="patient-summary">

        <div class="summary-card">
            <label>Patient</label>
            <span>
                {{patient.givenName}}
                {{patient.familyName}}
            </span>
        </div>

        <div class="summary-card">
            <label>Patient Identifier</label>
            <span>{{patient.identifier}}</span>
        </div>

        <div class="summary-card">
            <label>Visit UUID</label>
            <span>{{claimRequest.visitUuid}}</span>
        </div>

    </div>

    <form class="simple-form-ui">

        <section class="form-section">
<!--            <h3>Insurance Details</h3>-->
        </section>

        <section class="form-section">

            <div class="section-title">
                <h3>Final Bill Items</h3>

                <button type="button"
                        class="secondary-btn"
                        ng-click="addBillItem()">

                    + Add Item
                </button>
            </div>

            <table class="table bill-table">

                <thead>
                <tr>
                    <th>Service</th>
                    <th>Code</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Total</th>
                    <th></th>
                </tr>
                </thead>

                <tbody>

                <tr ng-repeat="item in claimRequest.items">

                    <td>
                        <input type="text"
                               ng-model="item.serviceDisplay">
                    </td>

                    <td>
                        <input type="text"
                               ng-model="item.serviceCode">
                    </td>

                    <td>
                        <input type="number"
                               ng-model="item.unitPrice">
                    </td>

                    <td>
                        <input type="number"
                               ng-model="item.quantity">
                    </td>

                    <td>
                        <input type="number"
                               ng-model="item.net">
                    </td>

                    <td>
                        <button type="button"
                                class="danger-btn"
                                ng-click="removeBillItem($index)">
                            Remove
                        </button>
                    </td>

                </tr>

                </tbody>

            </table>

        </section>

        <div class="claim-total">

            Total Claim Amount:
            <strong>
                ₹ {{getTotalAmount()}}
            </strong>

        </div>

        <div class="action-container">

            <button type="button"
                    class="success-btn"
                    ng-click="submitClaim()">

                Submit Final Claim
            </button>

        </div>

    </form>

</div>
