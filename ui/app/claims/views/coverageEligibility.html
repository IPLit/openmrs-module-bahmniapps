<div class="claim-page">

    <div class="page-header">
        <h2>Predetermination Request</h2>
        <p>Check estimated insurance coverage before treatment</p>
    </div>

    <div class="patient-summary">

        <div class="summary-card">
            <label>Patient</label>
            <span>{{ getPatientName() }}</span>
        </div>

        <div class="summary-card">
            <label>Patient Identifier</label>
            <span>{{ getPatientIdentifier() }}</span>
        </div>

    </div>

    <form class="simple-form-ui">
        <section class="form-section">
            <div class="section-title">
                <h3>Estimated Billing Items</h3>

                <button type="button"
                        class="secondary-btn"
                        ng-click="addBillItem()">
                    + Add Item
                </button>
            </div>

            <table class="table bill-table">
                <thead>
                <tr>
                    <th>Service</th>
                    <th>Code</th>
                    <th>Unit Price</th>
                    <th>Qty</th>
                    <th>Net Amount</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr ng-repeat="item in claimRequest.items">
                    <td>
                        <input type="text"
                               ng-model="item.serviceDisplay"
                               placeholder="Room Charges">
                    </td>
                    <td>
                        <input type="text"
                               ng-model="item.serviceCode"
                               placeholder="room-charges">
                    </td>
                    <td>
                        <input type="number"
                               ng-model="item.unitPrice">
                    </td>
                    <td>
                        <input type="number"
                               ng-model="item.quantity">
                    </td>
                    <td>
                        <input type="number"
                               ng-model="item.net">
                    </td>
                    <td>
                        <button type="button"
                                class="danger-btn"
                                ng-click="removeBillItem($index)">
                            Remove
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>

        <div class="action-container">
            <button type="button"
                    class="primary-btn"
                    ng-click="submitPredetermination()">

                Submit Predetermination
            </button>
        </div>
    </form>
    <ng-include src="views/claimsHistory.html">
    </ng-include>
</div>
