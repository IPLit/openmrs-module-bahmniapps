<style>
    .container {
  border: 1px solid red;
  position: relative;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  height: 100%;
  max-height: 90vh;        /* prevent dialog from exceeding viewport */
  overflow: hidden;
}

.container .signature {
  border: 1px solid orange;
  margin: 0 auto;
  cursor: pointer;
  flex: 1;                 /* take available space between header and buttons */
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container .signature canvas {
  border: 1px solid #999;
  cursor: pointer;
  display: block;
  /* don't set explicit width/height here — let calculateScale handle it */
}

.container .buttons {
  flex-shrink: 0;          /* buttons never get pushed out */
  padding: 8px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

  </style>
<div class="container">
    <div class="ngdialog-close"></div>
    <signature-pad accept="accept" clear="clear" height="720" width="720" dataurl="dataurl"></signature-pad>

    <div class="buttons">
        <button ng-click="clear()">Clear</button>
        <button ng-click="signature = accept()">Save</button>
        <button ng-click="closeThisDialog()">Cancel</button>
    </div>

  <div>  {{signature}}</div>
</div>
